<!DOCTYPE html>
<html>

<head>
  <title> Sign Up Page </title>
</head>

<body>
  <h1> Sign Up </h1>
  <!--autocomplete off makes it so it doesn't keep trying to autocomplete, since it doesn't count as an
  event and it becomes confusing why the counties aren't populating-->
  <form id="signupForm" action="welcome.html" autocomplete="off">
    First Name:<input type="text" name="fName"><br>
    Last Name: <input type="text" name="lName"><br>
    Gender:
    <input type="radio" name="gender" value="m">Male<br>
    <input type="radio" name="gender" value="f">Female<br>
    <input type="radio" name="gender" value="nb">Non-binary<br>

    Zip Code: <input type="text" id="zip" name="zip"><br>
    City: <span id="city"></span> <br>
    Latitude: <span id="Latitude"></span><br>
    Longitude: <span id="Longitude"></span><br><br>

    State:
    <select id="state" name="state">
      <option value=""> Select One </option>
      <option value="ca">California</option>
      <option value="ny">New York</option>
      <option value="tx">Texas</option>
    </select> <br>


    Select a County: <select id="county">
      <option> Select County </option>
    </select><br>


    Desired Username:
    <input type="text" id="username"><br><br>
    <span id="usernameError"></span><br>


    Password: <input type="password" id="password">
    <span id="suggestedPwd"></span> <br>
    Type Password Again: <input type="password" id="passwordAgain"><br>

    <span id="passwordError"></span>

    <input type="submit" value="Sign up!">
  </form>
  <script src="js/script.js"></script>
</body>

</html>
